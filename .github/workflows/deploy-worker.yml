name: Deploy Worker

on:
  push:
    paths:
      - 'worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          secrets: |
              YAHOO_APP_ID
        env:
          YAHOO_APP_ID: ${{ secrets.YAHOO_APP_ID }}
